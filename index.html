<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Jahil</title>

<style>
body{
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.kalkulator{
    background:#333;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

#layar{
    width:100%;
    height:60px;
    font-size:24px;
    margin-bottom:15px;
    text-align:right;
    padding:10px;
    box-sizing:border-box;
    border:none;
    border-radius:8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    opacity:0.85;
}

.operator{
    background:orange;
}

.sama{
    background:limegreen;
    color:white;
}

.clear{
    background:red;
    color:white;
}
</style>
</head>

<body>

<div class="kalkulator">

<input type="text" id="layar" readonly>

<div class="grid">

<button onclick="tambah('7')">7</button>
<button onclick="tambah('8')">8</button>
<button onclick="tambah('9')">9</button>
<button class="operator" onclick="tambah('/')">÷</button>

<button onclick="tambah('4')">4</button>
<button onclick="tambah('5')">5</button>
<button onclick="tambah('6')">6</button>
<button class="operator" onclick="tambah('*')">×</button>

<button onclick="tambah('1')">1</button>
<button onclick="tambah('2')">2</button>
<button onclick="tambah('3')">3</button>
<button class="operator" onclick="tambah('-')">−</button>

<button onclick="tambah('0')">0</button>
<button onclick="tambah('.')">.</button>
<button class="sama" onclick="hasil()">=</button>
<button class="operator" onclick="tambah('+')">+</button>

<button class="clear" style="grid-column:span 4;" onclick="hapus()">
C
</button>

</div>

</div>

<script>

const layar=document.getElementById("layar");

function tambah(nilai){
    layar.value+=nilai;
}

function hapus(){
    layar.value="";
}

function hasil(){
    layar.value="Hitung sendiri blok";
}

</script>

</body>
</html>
